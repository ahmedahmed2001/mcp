name: 🤖 MCP Agent

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🔍 Analyze repo via MCP
        id: mcp
        env:
          MCP_URL: ${{ secrets.MCP_SERVER_URL }}
        run: |
          echo "🔗 Calling MCP Server..."
          
          response=$(curl -s -X POST "$MCP_URL/github-webhook" \
            -H "Content-Type: application/json" \
            -H "ngrok-skip-browser-warning: true" \
            -d "{\"repository\": \"${{ github.event.repository.name }}\", \"action\": \"analyze\"}")
          
          echo "📊 Response: $response"
          
          # Extraire les valeurs
          readme_missing=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('readme_missing','false')).lower())")
          issues=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); issues=d.get('scan_result',{}).get('issues',[]); print('\n'.join([i['message'] for i in issues]))")
          
          echo "readme_missing=$readme_missing" >> $GITHUB_OUTPUT
          echo "issues<<EOF" >> $GITHUB_OUTPUT
          echo "$issues" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📝 Create Issue if problems found
        if: steps.mcp.outputs.issues != ''
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = `${{ steps.mcp.outputs.issues }}`;
            const readmeMissing = `${{ steps.mcp.outputs.readme_missing }}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🤖 [MCP Agent] Problems detected in repository',
              body: `## 🔍 MCP Analysis Report
              
**Repository:** ${context.repo.repo}
**Triggered by:** Push on \`${context.ref}\`
**Date:** ${new Date().toISOString()}

## ⚠️ Issues Detected

${issues.split('\n').map(i => `- ${i}`).join('\n')}

## 📋 Recommended Actions

${readmeMissing === 'true' ? '- [ ] Add README.md' : ''}
- [ ] Review and fix detected issues

---
*Auto-generated by MCP Agent 🤖*`,
              labels: ['mcp-agent', 'automated', 'quality']
            });

